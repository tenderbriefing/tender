# Full production deploy: Firebase + Cloud Run + hosting proxy.
# Requires repository secret: FIREBASE_SERVICE_ACCOUNT (GCP service account JSON).
# See docs/CI_CD_SETUP.md

name: Deploy TenderBriefing

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: tenderbriefing-34679
  CLOUD_RUN_REGION: africa-south1
  PROXY_REGION: europe-west1

jobs:
  deploy_firebase:
    name: Firebase (rules, indexes, storage, hosting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Firestore, Storage, Hosting
        run: |
          npx firebase-tools deploy \
            --only firestore:rules,firestore:indexes,storage,hosting \
            --project ${{ env.GCP_PROJECT }} \
            --non-interactive

  deploy_cloud_run:
    name: Cloud Run (africa-south1)
    runs-on: ubuntu-latest
    needs: deploy_firebase
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy app
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.CLOUD_RUN_REGION }}

  deploy_hosting_proxy:
    name: Hosting proxy (europe-west1)
    runs-on: ubuntu-latest
    needs: deploy_cloud_run
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy edge proxy
        run: |
          gcloud builds submit \
            --config cloudbuild-hosting-proxy.yaml \
            --project ${{ env.GCP_PROJECT }} \
            --region ${{ env.PROXY_REGION }}

  verify_production:
    name: Verify domains & health
    runs-on: ubuntu-latest
    needs: [deploy_cloud_run, deploy_hosting_proxy]
    steps:
      - name: Health and domain checks
        run: |
          set -e
          health_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            "https://www.tenderbriefing.co.za/api/integrations/health")
          echo "health: $health_code"
          test "$health_code" = "200"
          python3 -c "import json; d=json.load(open('/tmp/health.json')); assert d.get('ok') is True, d"
          for url in \
            "https://www.tenderbriefing.co.za/" \
            "https://tenderbriefing.co.za/" \
            "https://tenderbriefing-34679.web.app/"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "$code $url"
            test "$code" = "200" -o "$code" = "307" -o "$code" = "308"
          done
